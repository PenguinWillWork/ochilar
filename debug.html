<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ochilar debug</title>
    <style>
      html, body {
        margin: 0; padding: 12px;
        background: #1e1e1e; color: #ddd;
        font-family: system-ui, sans-serif; font-size: 12px;
        user-select: none;
      }
      h3 { margin: 0 0 8px; font-size: 13px; color: #fff; }
      button {
        background: #2d2d2d; color: #ddd; border: 1px solid #555;
        padding: 5px 10px; margin: 3px 3px 3px 0; border-radius: 4px;
        cursor: pointer; font-size: 11px;
      }
      button:hover { background: #3d3d3d; }
      .row { margin: 6px 0; }
      .stat {
        color: #aaa; font-size: 11px; margin-top: 10px;
        font-family: ui-monospace, monospace; line-height: 1.5;
        border-top: 1px solid #333; padding-top: 8px;
      }
      .bar {
        display: inline-block; width: 140px; height: 6px;
        background: #333; border-radius: 3px; vertical-align: middle; margin-left: 4px;
      }
      .bar > div {
        height: 100%; border-radius: 3px;
        transition: width 500ms, background 500ms;
      }
    </style>
  </head>
  <body>
    <h3>Ochilar — dev controls</h3>
    <div class="row">
      <button id="btn-drift">Drift now</button>
      <button id="btn-dim">Dim now</button>
      <button id="btn-test">Test rect</button>
      <button id="btn-clear">Clear</button>
    </div>
    <div class="row">
      <button id="btn-pause">Pause</button>
      <button id="btn-reset">Reset fatigue</button>
    </div>
    <div class="row">
      time: <button data-scale="1">1×</button>
      <button data-scale="30">30×</button>
      <button data-scale="120">120×</button>
    </div>
    <div class="stat" id="stat">waiting for overlay…</div>

    <script>
      const { emit, listen } = window.__TAURI__.event;
      const send = (name, payload) => emit(name, payload ?? null);

      document.getElementById("btn-drift").onclick = () => send("dbg:drift");
      document.getElementById("btn-dim").onclick   = () => send("dbg:dim");
      document.getElementById("btn-test").onclick  = () => send("dbg:test");
      document.getElementById("btn-clear").onclick = () => send("dbg:clear");
      document.getElementById("btn-pause").onclick = (e) => {
        send("dbg:toggle-pause");
      };
      document.getElementById("btn-reset").onclick = () => send("dbg:reset");
      document.querySelectorAll("button[data-scale]").forEach(b => {
        b.onclick = () => send("dbg:scale", { scale: Number(b.dataset.scale) });
      });

      // Overlay sends stats here
      listen("dbg:stats", (e) => {
        document.getElementById("stat").innerHTML = e.payload;
      });
    </script>
  </body>
</html>
