<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ochilar</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; height: 100%;
        background: #16181d; color: #e6e6e6;
        font-family: system-ui, sans-serif; font-size: 13px;
        user-select: none;
      }
      body { display: flex; flex-direction: column; padding: 16px; box-sizing: border-box; }
      h1 { margin: 0 0 2px; font-size: 16px; font-weight: 600; letter-spacing: .3px; }
      .sub { color: #8a8f99; font-size: 11px; margin-bottom: 14px; }
      .btns { display: flex; gap: 8px; margin-bottom: 16px; }
      button {
        flex: 1; background: #2a2e37; color: #e6e6e6; border: 1px solid #3a3f4a;
        padding: 9px 10px; border-radius: 7px; cursor: pointer; font-size: 13px;
        transition: background .15s;
      }
      button:hover { background: #343945; }
      #btn-pause.paused { background: #3a2f1e; border-color: #6b5326; color: #f0c674; }
      .status { margin-top: auto; }
      .bar { height: 8px; background: #23262d; border-radius: 4px; overflow: hidden; margin: 6px 0 8px; }
      .bar > div { height: 100%; border-radius: 4px; transition: width .5s, background .5s; }
      .line { color: #aab; font-size: 11.5px; line-height: 1.7; font-variant-numeric: tabular-nums; }
      .zone { font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>Ochilar</h1>
    <div class="sub">Ambient eye-rest cues</div>
    <div class="btns">
      <button id="btn-pause">Pause</button>
      <button id="btn-settings">Settings</button>
    </div>
    <div class="status">
      <div>Fatigue <span id="pct">0%</span></div>
      <div class="bar"><div id="barfill" style="width:0%;background:#3ddc84"></div></div>
      <div class="line">
        zone <span class="zone" id="zone">green</span> · <span id="worked">0m00s</span> worked<br>
        <span id="restline">working</span> · activity <span id="activity">–</span><br>
        next blink <span id="nblink">–</span> · next drift <span id="ndrift">–</span>
      </div>
    </div>
    <script type="module" src="/src/control.ts"></script>
  </body>
</html>
